<!doctype html>
<html lang="en">

  <head>

  <!-- Organization structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Hamzury Innovation Hub",
    "alternateName": "HAMZURY",
    "url": "https://hamzury.com",
    "logo": "https://hamzury.com/logo-hamzury.svg",
    "description": "Nigeria's premier business infrastructure company — CAC registration, business systems, and professional skills training.",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Abuja",
      "addressRegion": "FCT",
      "addressCountry": "NG"
    },
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+234-803-462-0520",
      "contactType": "customer service",
      "availableLanguage": "English"
    },
    "sameAs": [
      "https://instagram.com/hamzury",
      "https://twitter.com/hamzury",
      "https://linkedin.com/company/hamzury",
      "https://facebook.com/hamzury"
    ]
  }
  </script>
  <!-- LocalBusiness structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "Hamzury Innovation Hub",
    "image": "https://hamzury.com/og-default.svg",
    "url": "https://hamzury.com",
    "telephone": "+234-803-462-0520",
    "priceRange": "₦₦",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Wuse Zone 2",
      "addressLocality": "Abuja",
      "addressRegion": "FCT",
      "addressCountry": "NG"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": 9.0765,
      "longitude": 7.3986
    },
    "openingHoursSpecification": {
      "@type": "OpeningHoursSpecification",
      "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
      "opens": "09:00",
      "closes": "18:00"
    },
    "servedCuisine": null,
    "hasMap": "https://maps.google.com/?q=Abuja,+FCT,+Nigeria"
  }
  </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

      defer
